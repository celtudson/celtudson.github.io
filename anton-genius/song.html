<!DOCTYPE html>
<html lang="ru">

<!--<span class=\"target\" data-id=\"briket\">-->

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Genius Clone</title>
	<style>
		body {
			margin: 0;
			padding: 0;
			font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
			background-color: #0a0a0a;
			/* Глубокий тёмный фон */
			color: #e3e3e3;
			/* Приятный для глаз белый/серый текст */
		}

		header {
			background-color: #ffff00;
			padding: 15px 20px;
			font-weight: 900;
			font-size: 24px;
			letter-spacing: -1px;
			border-bottom: 2px solid #000;
		}

		header a {
			text-decoration: none;
			color: #000;
		}

		header span {
			background: #000;
			color: #ffff00;
			padding: 2px 6px;
			margin-right: 5px;
		}

		.main-container {
			display: flex;
			max-width: 1200px;
			margin: 0 auto;
			padding: 40px 20px;
			gap: 40px;
		}

		.lyrics-column {
			flex: 7;
		}

		.song-title {
			font-family: Georgia, serif;
			font-size: 38px;
			font-weight: bold;
			color: #ffffff;
			/* Заголовок чисто белый */
			margin: 0 0 10px 0;
		}

		.artist-name {
			font-size: 18px;
			color: #5d75ff;
			/* Ослабили ядовито-синий цвет на более пастельный */
			font-weight: bold;
			margin-bottom: 30px;
		}

		.lyrics-box {
			font-family: Georgia, serif;
			font-size: 20px;
			line-height: 1.6;
			color: #e3e3e3;
			/* Основной текст песни */
			white-space: pre-line;
		}

		.target {
			background-color: rgba(255, 255, 0, 0.18);
			cursor: pointer;
			padding: 1px 0;
			text-decoration: none;
			color: inherit;
		}

		.target:hover {
			background-color: rgba(255, 255, 0, 0.4);
		}

		/* Верифицированный зеленый маркер */
		.target.verified {
			background-color: rgba(0, 255, 120, 0.12);
		}

		.target.verified:hover {
			background-color: rgba(0, 255, 120, 0.3);
		}

		.target.active {
			background-color: #ff9900 !important;
			color: #000000 !important;
			/* Текст внутри нажатой строки временно делаем чёрным для читаемости */
			font-weight: bold;
			outline: 2px solid #ffffff;
			/* Белая рамка вместо чёрной! */
			outline-offset: 1px;
		}

		/* Правая колонка-контейнер */
		.sidebar-column {
			flex: 4;
			min-width: 300px;
			position: relative;
			/* База для абсолютных расчетов, если понадобятся */
		}

		/* Сама карточка с аннотацией, которая теперь будет "прилипать" */
		.annotation-card {
			background: #161616;
			/* Тёмно-серый фон карточки, чтобы выделялась на чёрном body */
			border: 1px solid #2d2d2d;
			/* Тёмная аккуратная рамка */
			border-radius: 4px;
			padding: 20px;
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
			position: sticky;
			top: 85px;
			align-self: flex-start;
		}

		.card-header {
			font-size: 12px;
			text-transform: uppercase;
			font-weight: bold;
			color: #888;
			/* Чуть приглушили текст заголовка карточки */
			margin-bottom: 0px;
		}

		.card-header.verified-user {
			color: #00ff66;
			/* Яркий неоново-зеленый для верифицированных в темноте */
		}

		.card-body {
			font-size: 15px;
			/* line-height: 1.5; */
			color: #cccccc;
			/* Светло-серый текст самой аннотации */
		}

		.card-body p {
			margin-top: 4px;
			/* Небольшой аккуратный отступ сверху, либо 0, если нужно совсем вплотную */
			margin-bottom: 10px;
		}

		.card-body b,
		.card-body i {
			color: #ffffff;
		}

		.placeholder-text {
			color: #555;
			font-style: italic;
			text-align: center;
			padding: 40px 0;
		}

		/* Закрепленная панель плеера */
		.player-bar {
			position: sticky;
			top: 0;
			/* Фиксирует плеер у верхнего края при скролле */
			z-index: 100;
			/* Чтобы плеер был поверх текста песни */
			background-color: #111111;
			/* Темная тема для плеера, как на Genius */
			color: #ffffff;
			padding: 12px 20px;
			border-bottom: 1px solid #333;
			box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
		}

		.player-container {
			max-width: 1200px;
			margin: 0 auto;
			display: flex;
			align-items: center;
			gap: 20px;
		}

		.play-btn {
			background-color: #ffff00;
			color: #000;
			border: none;
			padding: 8px 16px;
			font-weight: bold;
			border-radius: 20px;
			cursor: pointer;
			font-size: 13px;
			letter-spacing: 0.5px;
			transition: transform 0.1s ease;
		}

		.play-btn:hover {
			transform: scale(1.05);
			background-color: #e6e600;
		}

		.track-info {
			display: flex;
			flex-direction: column;
			font-size: 13px;
		}

		.track-status {
			color: #888;
			font-size: 10px;
			font-weight: bold;
			letter-spacing: 1px;
		}

		.track-meta {
			font-weight: bold;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			max-width: 300px;
		}

		/* Фейковая полоса прокрутки трека */
		.progress-bar-wrap {
			flex-grow: 1;
			height: 4px;
			background-color: #333;
			border-radius: 2px;
			position: relative;
			cursor: pointer;
		}

		.progress-bar-fill {
			width: 23%;
			/* Шуточный прогресс, якобы песня чуть-чуть проиграна */
			height: 100%;
			background-color: #ffff00;
			border-radius: 2px;
		}

		.player-time {
			font-size: 12px;
			color: #aaa;
			font-family: monospace;
		}

		/* Небольшой фикс для адаптивности */
		@media (max-width: 600px) {
			.progress-bar-wrap {
				display: none;
			}
		}
	</style>
</head>

<body>

	<header><a href="index.html"><span>ANTON</span>GENIUS</a></header>

	<div class="player-bar">
		<div class="player-container">
			<audio id="audio-player" src=""></audio>

			<button class="play-btn" id="play-btn">▶ PLAY</button>

			<div class="track-info">
				<span class="track-status">СЛУШАТЬ ТРЕК:</span>
				<span class="track-meta" id="player-meta">Загрузка...</span>
			</div>

			<div class="progress-bar-wrap" id="progress-wrap">
				<div class="progress-bar-fill" id="progress-fill" style="width: 0%;"></div>
			</div>

			<div class="player-time" id="player-time">0:00 / 0:00</div>
		</div>
	</div>

	<div class="main-container">
		<main class="lyrics-column">
			<h1 class="song-title" id="song-title">Загрузка...</h1>
			<!--<div class="artist-name" id="artist-name"></div>-->
			<div class="lyrics-box" id="lyrics-box"></div>
		</main>

		<aside class="sidebar-column">
			<div class="annotation-card">
				<div class="placeholder-text" id="placeholder">
					Нажмите на подсвеченный текст.
				</div>
				<div id="card-content" style="display: none;">
					<div class="card-header" id="card-header"></div>
					<div class="card-body" id="card-body"></div>
				</div>
			</div>
		</aside>
	</div>

	<script>
		const urlParams = new URLSearchParams(window.location.search);
		const songId = urlParams.get('id');

		// Элементы плеера
		const audio = document.getElementById('audio-player');
		const playBtn = document.getElementById('play-btn');
		const progressWrap = document.getElementById('progress-wrap');
		const progressFill = document.getElementById('progress-fill');
		const playerTime = document.getElementById('player-time');

		if (!songId) {
			document.getElementById('song-title').innerText = "Песня не найдена";
		} else {
			fetch(`songs/${songId}.json`)
				.then(response => {
					if (!response.ok) throw new Error('Файл не найден');
					return response.json();
				})
				.then(data => {
					// Наполняем страницу текстом
					document.getElementById('song-title').innerText = data.title;
					// document.getElementById('artist-name').innerText = `Исполнитель: ${data.artist}`;
					document.getElementById('lyrics-box').innerHTML = data.lyrics;
					document.title = `${data.title} — Anton Genius`;
					document.getElementById('player-meta').innerText = `${data.artist} — ${data.title}`;

					// ПОДГРУЖАЕМ АУДИОФАЙЛ
					audio.src = `songs/${songId}.mp3`;

					initAnnotations(data.annotations);
					initPlayerLogic(); // Включаем логику плеера
				})
				.catch(err => {
					document.getElementById('song-title').innerText = "Ошибка загрузки трека";
					console.error(err);
				});
		}

		// --- ЛОГИКА АУДИОПЛЕЕРА ---
		function initPlayerLogic() {
			// Вспомогательная функция для форматирования времени (секунды -> мм:сс)
			function formatTime(seconds) {
				if (isNaN(seconds)) return "0:00";
				const mins = Math.floor(seconds / 60);
				const secs = Math.floor(seconds % 60);
				return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
			}

			// Клик на Play / Pause
			playBtn.addEventListener('click', () => {
				if (audio.paused) {
					audio.play();
					playBtn.innerText = "❚❚ PAUSE";
				} else {
					audio.pause();
					playBtn.innerText = "▶ PLAY";
				}
			});

			// Отображение общей длительности, когда аудио загрузилось
			audio.addEventListener('loadedmetadata', () => {
				playerTime.innerText = `0:00 / ${formatTime(audio.duration)}`;
			});

			// Обновление прогресс-бара и таймера в процессе проигрывания
			audio.addEventListener('timeupdate', () => {
				const percentage = (audio.currentTime / audio.duration) * 100;
				progressFill.style.width = `${percentage}%`;
				playerTime.innerText = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
			});

			// Перемотка трека кликом по полосе прогресса
			progressWrap.addEventListener('click', (e) => {
				const width = progressWrap.clientWidth;
				const clickX = e.offsetX; // Где кликнули
				const duration = audio.duration;

				if (duration) {
					audio.currentTime = (clickX / width) * duration;
				}
			});

			// Если трек закончился, возвращаем кнопку в исходное состояние
			audio.addEventListener('ended', () => {
				playBtn.innerText = "▶ PLAY";
				progressFill.style.width = "0%";
			});
		}

		// --- ЛОГИКА АННОТАЦИЙ ---
		function initAnnotations(annotations) {
			const targets = document.querySelectorAll('.target');
			const placeholder = document.getElementById('placeholder');
			const cardContent = document.getElementById('card-content');
			const cardHeader = document.getElementById('card-header');
			const cardBody = document.getElementById('card-body');

			targets.forEach(target => {
				target.addEventListener('click', function () {
					targets.forEach(t => t.classList.remove('active'));
					this.classList.add('active');

					const id = this.getAttribute('data-id');
					const anno = annotations[id];

					if (anno) {
						placeholder.style.display = 'none';
						cardContent.style.display = 'block';

						if (anno.verified) {
							cardHeader.className = "card-header verified-user";
							cardHeader.innerHTML = `✓ ВЕРИФИЦИРОВАНО:<br><br>${anno.author}`;
						} else {
							cardHeader.className = "card-header";
							cardHeader.innerHTML = `АНАЛИТИКА: ${anno.author}`;
						}
						cardBody.innerHTML = anno.text;
					}
				});
			});
		}
	</script>
</body>

</html>
